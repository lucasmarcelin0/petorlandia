name: Authorization Gate

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  authorization-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run authorization integration suite (merge gate)
        run: |
          pytest -q tests/test_sensitive_endpoints_authorization.py tests/test_security_authorization.py tests/test_clinic_staff_permissions.py
