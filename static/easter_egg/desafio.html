<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PetOrlândia · Desafio Secreto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100%;
      font-family: 'Poppins', sans-serif; color: #fff; background: #0f172a;
    }
    body.game-body {
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; transition: background 0.7s ease;
    }
    #root { width: 100%; padding: 24px; }

    /* ── BOTÃO VOLTAR ── */
    .back-btn {
      position: fixed; top: 14px; left: 16px; z-index: 999;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 999px;
      background: rgba(30,41,59,.85); backdrop-filter: blur(8px);
      color: rgba(226,232,240,.9); font-size: .82rem; font-weight: 600;
      text-decoration: none; border: 1px solid rgba(148,163,184,.3);
      transition: background .18s, transform .18s;
    }
    .back-btn:hover { background: rgba(51,65,85,.95); transform: translateY(-1px); color: #fff; }

    .game-container {
      width: min(720px, 100%); margin: 0 auto; padding: 48px 32px;
      border-radius: 28px; background: rgba(15,23,42,.7);
      backdrop-filter: blur(12px); box-shadow: 0 25px 70px rgba(15,23,42,.45);
      display: flex; flex-direction: column; align-items: center; gap: 28px; text-align: center;
    }
    .share-box {
      background: rgba(15,23,42,.45); border-radius: 18px; padding: 12px 18px;
      font-size: .95rem; line-height: 1.5;
      box-shadow: inset 0 0 0 1px rgba(148,163,184,.25); word-break: break-word;
    }
    .mode-switch {
      display: flex; align-items: center; gap: 12px;
      background: rgba(15,23,42,.45); padding: 8px 16px; border-radius: 999px;
      box-shadow: inset 0 0 0 1px rgba(148,163,184,.25);
      font-size: .95rem; flex-wrap: wrap; justify-content: center;
    }
    .mode-switch__label { font-weight: 500; color: rgba(226,232,240,.92); }
    .mode-switch__options { display: flex; gap: 8px; }
    .mode-switch__option {
      border: none; border-radius: 999px; padding: 6px 16px;
      font-size: .9rem; font-weight: 600; cursor: pointer; color: #f8fafc;
      background: rgba(30,41,59,.75); box-shadow: inset 0 0 0 1px rgba(148,163,184,.35);
      transition: transform .18s ease, filter .18s ease;
    }
    .mode-switch__option:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.05); }
    .mode-switch__option:disabled { cursor: not-allowed; opacity: .55; filter: none; transform: none; }
    .mode-switch__option--active {
      background: linear-gradient(135deg,#f97316,#ef4444);
      box-shadow: 0 12px 28px rgba(249,115,22,.32); transform: translateY(-1px);
    }
    .share-box code {
      display: inline-block; margin-top: 4px; padding: 4px 8px;
      background: rgba(30,41,59,.7); border-radius: 8px; font-size: .9rem; color: #e2e8f0;
    }
    .game-error {
      width: min(560px,100%); margin: 0 auto; padding: 40px 28px; border-radius: 24px;
      background: rgba(15,23,42,.78); box-shadow: 0 25px 70px rgba(15,23,42,.45);
      text-align: center; line-height: 1.6;
    }
    .game-error__title { margin: 0 0 12px; font-size: clamp(1.3rem,3vw,1.6rem); font-weight: 600; }
    .game-error__text { margin: 0; color: rgba(226,232,240,.88); font-size: 1rem; }
    .game-title {
      font-size: clamp(2rem,4vw,2.6rem); font-weight: 600;
      letter-spacing: .02em; text-shadow: 0 4px 16px rgba(15,23,42,.6);
    }
    .status-text {
      font-size: clamp(1.1rem,2.5vw,1.35rem); font-weight: 500;
      margin: 0; text-shadow: 0 2px 10px rgba(15,23,42,.45);
    }
    .emoji { font-size: 1.6rem; margin-right: .25rem; }
    .turn-summary {
      width: 100%; margin: -12px 0 8px; padding: 14px 18px; border-radius: 16px;
      background: rgba(15,23,42,.55); box-shadow: inset 0 0 0 1px rgba(148,163,184,.22); text-align: left;
    }
    .turn-summary__text { margin: 0 0 8px; font-size: .95rem; line-height: 1.5; color: #e2e8f0; }
    .turn-summary__list { margin: 0; padding-left: 18px; color: rgba(226,232,240,.9); font-size: .9rem; line-height: 1.4; }
    .names-section { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; width: 100%; }
    .name-field { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; min-width: min(220px,100%); }
    .name-label { font-size: .9rem; font-weight: 500; color: rgba(226,232,240,.9); }
    .name-input {
      width: 100%; padding: 10px 14px; border-radius: 12px; border: none;
      background: rgba(30,41,59,.8); color: #f8fafc; font-size: .95rem;
      box-shadow: inset 0 0 0 1px rgba(148,163,184,.35); transition: box-shadow .18s ease, transform .18s ease;
    }
    .name-input:focus { outline: none; box-shadow: inset 0 0 0 2px rgba(96,165,250,.8); transform: translateY(-1px); }
    .stick-board { display: flex; flex-direction: column; gap: 22px; width: 100%; align-items: center; }
    .stick-row { display: flex; justify-content: center; gap: 18px; transition: opacity .3s ease; }
    .stick-row--disabled { opacity: .35; }
    .stick-row--locked .stick { box-shadow: 0 0 0 3px rgba(248,250,252,.28); }
    .stick {
      width: 16px; height: 78px; border-radius: 999px;
      background: var(--stick-color,#f97316); box-shadow: 0 10px 24px rgba(15,23,42,.45);
      cursor: pointer; transition: transform .18s ease, filter .18s ease, opacity .18s ease;
    }
    .stick:hover { transform: translateY(-4px) scale(1.05); filter: brightness(1.08); }
    .stick:active { transform: scale(.94); }
    .stick--hidden { opacity: .25; background: rgba(241,245,249,.5) !important; cursor: default; box-shadow: none; transform: none; filter: none; }
    .rule-message { margin: -6px 0 12px; padding: 10px 16px; border-radius: 12px; background: rgba(248,250,252,.12); color: #f8fafc; font-size: .95rem; box-shadow: inset 0 0 0 1px rgba(148,163,184,.25); }
    .controls { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
    .button { border: none; border-radius: 999px; padding: 12px 30px; font-size: 1rem; font-weight: 600; cursor: pointer; color: #fff; transition: transform .18s ease, filter .18s ease; }
    .button:disabled { cursor: not-allowed; background: rgba(148,163,184,.4); transform: none; filter: none; }
    .button--primary { background: linear-gradient(135deg,#22c55e,#16a34a); box-shadow: 0 15px 35px rgba(34,197,94,.35); }
    .button--primary:not(:disabled):hover { filter: brightness(1.05); transform: translateY(-2px); }
    .button--secondary { background: linear-gradient(135deg,#3b82f6,#2563eb); box-shadow: 0 15px 35px rgba(59,130,246,.35); }
    .button--secondary:hover { filter: brightness(1.05); transform: translateY(-2px); }
    @media (max-width: 540px) {
      .game-container { padding: 40px 22px; border-radius: 24px; }
      .name-field { min-width: 100%; }
      .stick { width: 14px; height: 68px; }
      .controls { gap: 10px; }
      .button { width: 100%; }
    }
  </style>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
  <script defer src="/surpresa/main.js"></script>
</head>
<body class="game-body">
  <a class="back-btn" href="/surpresa">← Arcade</a>
  <div id="root"></div>
</body>
</html>
