<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruto – Sadness and Sorrow | Prática</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#f1f5f9;font-family:'Segoe UI',sans-serif;
     height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

/* ── HEADER ───────────────────────────────────── */
header{background:#1e293b;border-bottom:1px solid #334155;
       padding:8px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.title{font-size:.95rem;font-weight:700;color:#f59e0b;white-space:nowrap}
.title small{color:#64748b;font-size:.7rem;font-weight:400;margin-left:6px}
.stats{display:flex;gap:18px;flex-shrink:0}
.stat{text-align:center}
.stat label{display:block;font-size:.58rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em}
.stat .val{font-size:1.05rem;font-weight:800}
#prgVal{color:#34d399}
#accVal{color:#60a5fa}
#notVal{color:#a78bfa}

/* ── CONTROLS ────────────────────────────────── */
.controls{background:#1e293b;border-bottom:1px solid #334155;
          padding:6px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
.btn{padding:5px 15px;border:none;border-radius:6px;cursor:pointer;
     font-size:.8rem;font-weight:700;transition:background .15s}
#startBtn{background:#10b981;color:#fff}
#startBtn:hover{background:#059669}
#startBtn.on{background:#ef4444}
#startBtn.on:hover{background:#dc2626}
#resetBtn{background:#334155;color:#cbd5e1}
#resetBtn:hover{background:#475569}
.bpm-row{display:flex;align-items:center;gap:7px;font-size:.78rem;color:#94a3b8}
.bpm-row input{width:110px;accent-color:#f59e0b;cursor:pointer}
#bpmVal{color:#f59e0b;font-weight:700;min-width:52px}
.mic-row{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:.7rem;color:#64748b}
.mic-dot{width:7px;height:7px;border-radius:50%;background:#334155;transition:background .3s}
.mic-dot.on{background:#34d399;box-shadow:0 0 6px #34d399}

/* ── SHEET SCROLL AREA ───────────────────────── */
.sheet-wrap{
  flex:1;position:relative;overflow:hidden;
  background:#f0efe9;
  display:flex;align-items:center;   /* centralizar verticalmente */
  border-bottom:2px solid #334155;
}
#stripImg{
  position:absolute;
  height:88%;     /* 88% da altura do container */
  width:auto;
  top:6%;
  left:0;
  will-change:transform;
  image-rendering:high-quality;
}
/* Playhead vertical */
.playhead{
  position:absolute;top:0;bottom:0;width:3px;z-index:20;pointer-events:none;
  background:rgba(239,68,68,.92);
  box-shadow:0 0 0 1px rgba(239,68,68,.3), 0 0 16px rgba(239,68,68,.65);
}
/* Overlay esmaecedor à esquerda (notas já tocadas) */
.fade-left{
  position:absolute;top:0;bottom:0;left:0;width:180px;z-index:15;pointer-events:none;
  background:linear-gradient(90deg,rgba(240,239,233,1) 0%,rgba(240,239,233,0) 100%);
}
/* Loading */
#loadCover{position:absolute;inset:0;display:flex;flex-direction:column;
           align-items:center;justify-content:center;background:#f0efe9;z-index:30}
#loadCover p{color:#374151;margin-top:10px;font-size:.85rem}
.spin{width:30px;height:30px;border:3px solid #e5e7eb;border-top-color:#f59e0b;
      border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FEEDBACK ────────────────────────────────── */
.feedback{background:#1e293b;border-top:1px solid #334155;
          padding:7px 18px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.note-box{text-align:center;min-width:56px}
.note-box label{display:block;font-size:.56rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px}
.note-name{font-size:1.4rem;font-weight:800;line-height:1}
#expNote{color:#f59e0b}
#detNote{color:#60a5fa}
.fb-mid{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.match-ico{font-size:1.25rem}
.acc-bg{width:100%;max-width:260px;height:5px;background:#334155;border-radius:3px;overflow:hidden}
.acc-fill{height:100%;background:linear-gradient(90deg,#ef4444,#f59e0b,#34d399);
          border-radius:3px;transition:width .3s}
.acc-lbl{font-size:.6rem;color:#64748b;margin-top:2px}
.cents-row{display:flex;align-items:center;gap:6px;min-width:145px}
.cents-row label{font-size:.58rem;color:#64748b}
.cents-bg{position:relative;flex:1;height:6px;background:#334155;border-radius:3px}
.cents-mid{position:absolute;left:50%;top:-1px;width:2px;height:8px;background:#475569;transform:translateX(-50%)}
.cents-fill{position:absolute;height:100%;border-radius:3px;transition:left .04s,width .04s}
#centsLbl{font-size:.66rem;color:#60a5fa;min-width:28px}
.help-txt{font-size:.62rem;color:#475569;margin-left:auto;text-align:right;line-height:1.5}

    /* ── BOTÃO VOLTAR ARCADE ── */
    .back-arcade {
      position: fixed; bottom: 16px; left: 16px; z-index: 999;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 13px; border-radius: 999px;
      background: rgba(30,41,59,.9); backdrop-filter: blur(8px);
      color: rgba(203,213,225,.9); font-size: .75rem; font-weight: 600;
      text-decoration: none; border: 1px solid rgba(148,163,184,.25);
      transition: background .15s, transform .15s; font-family: 'Segoe UI', sans-serif;
    }
    .back-arcade:hover { background: rgba(51,65,85,1); transform: translateY(-1px); color: #fff; }
</style>
</head>

  {note:'G4',beats:1},{note:'F#4',beats:1},{note:'E4',beats:2},
  {note:'B3',beats:4},
  // CODA
  {note:'E5',beats:2},{note:'D5',beats:1},{note:'B4',beats:1},
  {note:'A4',beats:2},{note:'G4',beats:2},
  {note:'F#4',beats:4},
  {note:'E4',beats:4},
];
(()=>{ let t=0; MELODY.forEach(n=>{n.startBeat=t; t+=n.beats;}); })();
const TOTAL_BEATS = MELODY.reduce((s,n)=>s+n.beats,0);

// ══════════════════════════════════════════════
//  ESTADO
// ══════════════════════════════════════════════
let bpm=70, running=false, startTime=null, pausedAt=0, animId=null;
let audioCtx=null, analyser=null, pitchBuf=null;
let totalN=0, correctN=0, lastIdx=-1;
const noteResults = new Array(MELODY.length).fill(null);

// ══════════════════════════════════════════════
//  PARTITURA – SCROLL HORIZONTAL
// ══════════════════════════════════════════════
const stripImg  = document.getElementById('stripImg');
const sheetWrap = document.getElementById('sheetWrap');
const playhead  = document.getElementById('playhead');
const loadCover = document.getElementById('loadCover');

const PH_RATIO = 0.22;   // playhead a 22% da largura da janela

stripImg.onload = () => {
  loadCover.style.display = 'none';
  updatePos(0);
};
if(stripImg.complete) { loadCover.style.display='none'; updatePos(0); }

function getStripDisplayWidth(){
  // A imagem usa height:88% do container → largura escala proporcionalmente
  return stripImg.clientWidth;
}

function beatToStripX(beat){
  const sw = getStripDisplayWidth();
  const pad = sw * 0.01;  // 1% margem em cada lado
  return pad + (beat / TOTAL_BEATS) * (sw - 2*pad);
}

function updatePos(beat){
  const phX    = sheetWrap.clientWidth * PH_RATIO;
  const imgX   = beatToStripX(beat);
  stripImg.style.transform = `translateX(${phX - imgX}px)`;
  playhead.style.left      = phX + 'px';
}

// ══════════════════════════════════════════════
//  ÁUDIO – PITCH DETECTION (autocorrelação)
// ══════════════════════════════════════════════
async function startMic(){
  try{
    audioCtx = new(window.AudioContext||window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    const src    = audioCtx.createMediaStreamSource(stream);
    analyser     = audioCtx.createAnalyser();
    analyser.fftSize = 4096;
    src.connect(analyser);
    pitchBuf = new Float32Array(analyser.fftSize);
    document.getElementById('micDot').classList.add('on');
    document.getElementById('micLbl').textContent = 'Microfone ativo';
    return true;
  }catch(e){
    document.getElementById('micLbl').textContent = 'Microfone bloqueado';
    return false;
  }
}

function detectPitch(){
  if(!analyser) return null;
  analyser.getFloatTimeDomainData(pitchBuf);
  const N=pitchBuf.length, H=N>>1;
  let rms=0;
  for(let i=0;i<N;i++) rms+=pitchBuf[i]*pitchBuf[i];
  if(Math.sqrt(rms/N)<0.008) return null;

  let best=-1, bestC=0, lastC=1, found=false;
  for(let o=1;o<H;o++){
    let c=0; for(let i=0;i<H;i++) c+=pitchBuf[i]*pitchBuf[i+o];
    c/=H;
    if(c>0.85&&c>lastC){ found=true; if(c>bestC){bestC=c;best=o;} }
    else if(found) break;
    lastC=c;
  }
  return best>0 ? audioCtx.sampleRate/best : null;
}

// ══════════════════════════════════════════════
//  LOOP
// ══════════════════════════════════════════════
function currentBeat(){
  if(!startTime) return pausedAt;
  return pausedAt + (performance.now()-startTime)/1000*(bpm/60);
}
function noteAt(beat){
  for(let i=MELODY.length-1;i>=0;i--) if(MELODY[i].startBeat<=beat) return {n:MELODY[i],i};
  return {n:MELODY[0],i:0};
}
function setUI(el,v){ document.getElementById(el).textContent=v; }

function loop(){
  if(!running) return;
  const beat = currentBeat();
  if(beat>=TOTAL_BEATS){ endSong(); return; }

  // Scroll da partitura
  updatePos(beat);

  // Progresso
  setUI('prgVal', Math.min(100,Math.round(beat/TOTAL_BEATS*100))+'%');
  setUI('notVal', MELODY.filter((n,i)=>i===MELODY.findIndex(x=>x===n)&&n.note).length > 0
    ? Math.round(beat/TOTAL_BEATS*MELODY.filter(n=>n.note).length)+'/'+MELODY.filter(n=>n.note).length
    : '–');

  // Nota atual
  const {n:cur, i:idx} = noteAt(beat);
  setUI('expNote', cur.note||'–');
  if(idx!==lastIdx) lastIdx=idx;

  // Pitch
  const freq = detectPitch();
  const det  = freq ? freqToNote(freq) : null;
  setUI('detNote', det||'–');

  // Cents
  if(det&&freq){
    const c=freqToCents(freq,det), cl=Math.max(-50,Math.min(50,c));
    const fill=document.getElementById('centsFill');
    fill.style.left       = (cl<0?50+cl:50)+'%';
    fill.style.width      = Math.abs(cl)+'%';
    fill.style.background = Math.abs(c)<15?'#34d399':Math.abs(c)<30?'#f59e0b':'#ef4444';
    setUI('centsLbl',(c>0?'+':'')+c+'¢');
  } else {
    document.getElementById('centsFill').style.width='0';
    setUI('centsLbl','0¢');
  }

  // Feedback de acerto
  if(cur.note && det && noteResults[idx]===null){
    const ok=notesMatch(cur.note,det);
    noteResults[idx]=ok?'ok':'no';
    totalN++; if(ok) correctN++;
    updateAcc();
  }
  const ico=document.getElementById('matchIco');
  const lbl=document.getElementById('accLbl');
  if(!cur.note){ ico.textContent='⏸️'; lbl.textContent='Introdução – aguarde a melodia…'; }
  else if(det){
    const ok=notesMatch(cur.note,det);
    ico.textContent=ok?'✅':'❌';
    lbl.textContent=ok?'Nota correta!':'Nota incorreta';
  } else { ico.textContent='🎵'; lbl.textContent='Toque a nota indicada…'; }

  animId=requestAnimationFrame(loop);
}

function updateAcc(){
  if(!totalN){ setUI('accVal','–'); return; }
  const p=Math.round(correctN/totalN*100);
  setUI('accVal',p+'%');
  document.getElementById('accFill').style.width=p+'%';
}

function endSong(){
  running=false; cancelAnimationFrame(animId);
  document.getElementById('startBtn').textContent='▶ Iniciar';
  document.getElementById('startBtn').classList.remove('on');
  document.getElementById('matchIco').textContent='🎉';
  document.getElementById('accLbl').textContent='Música concluída! Reinicie para repetir.';
}

// ══════════════════════════════════════════════
//  CONTROLES
// ══════════════════════════════════════════════
async function play(){
  if(!audioCtx){ const ok=await startMic(); if(!ok){ alert('Permissão de microfone necessária.'); return; } }
  if(audioCtx.state==='suspended') await audioCtx.resume();
  startTime=performance.now(); running=true;
  document.getElementById('startBtn').textContent='⏸ Pausar';
  document.getElementById('startBtn').classList.add('on');
  loop();
}
function pause(){
  pausedAt=currentBeat(); startTime=null; running=false; cancelAnimationFrame(animId);
  document.getElementById('startBtn').textContent='▶ Continuar';
  document.getElementById('startBtn').classList.remove('on');
}
function reset(){
  pausedAt=0; startTime=null; running=false; cancelAnimationFrame(animId);
  totalN=0; correctN=0; lastIdx=-1; noteResults.fill(null);
  const btn=document.getElementById('startBtn');
  btn.textContent='▶ Iniciar'; btn.classList.remove('on');
  setUI('prgVal','0%'); setUI('accVal','–'); setUI('notVal','–');
  document.getElementById('accFill').style.width='0%';
  setUI('accLbl','Toque a melodia seguindo o cursor vermelho');
  setUI('expNote','–'); setUI('detNote','–');
  document.getElementById('matchIco').textContent='🎵';
  updatePos(0);
}

document.getElementById('startBtn').addEventListener('click',()=>{ if(running) pause(); else play(); });
document.getElementById('resetBtn').addEventListener('click', reset);
document.getElementById('bpmSlider').addEventListener('input',function(){
  if(running){ pausedAt=currentBeat(); startTime=performance.now(); }
  bpm=parseInt(this.value); setUI('bpmVal',bpm+' BPM');
});
window.addEventListener('resize', ()=>{ updatePos(currentBeat()); });
</script>
