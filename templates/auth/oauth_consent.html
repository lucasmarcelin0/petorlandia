{% extends 'layout.html' %}

{% block title %}Consentimento OAuth{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="card">
    <div class="card-body">
      <h3 class="card-title">Autorizar acesso</h3>
      <p><strong>{{ client.name }}</strong> solicita acesso à sua conta.</p>

      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="response_type" value="{{ response_type }}">
        <input type="hidden" name="client_id" value="{{ client_id }}">
        <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}">
        <input type="hidden" name="scope" value="{{ scope }}">
        <input type="hidden" name="state" value="{{ state }}">
        <input type="hidden" name="nonce" value="{{ nonce or '' }}">
        <input type="hidden" name="code_challenge" value="{{ code_challenge }}">
        <input type="hidden" name="code_challenge_method" value="{{ code_challenge_method }}">

        <p><strong>Escopos solicitados:</strong></p>
        <div class="mb-3">
          {% for item in requested_scopes %}
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="consent_scopes" value="{{ item }}" id="scope_{{ loop.index }}" required checked>
            <label class="form-check-label" for="scope_{{ loop.index }}">{{ item }}</label>
          </div>
          {% endfor %}
        </div>

        <button class="btn btn-primary" type="submit" name="consent_action" value="approve">Autorizar</button>
        <button class="btn btn-outline-secondary" type="submit" name="consent_action" value="deny">Negar</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
