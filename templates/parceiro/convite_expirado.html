{% extends "layout.html" %}
{% block main %}
<div class="container d-flex justify-content-center mt-5">
  <div class="card shadow-lg p-4 rounded-4 text-center" style="width: 100%; max-width: 480px;">
    <span class="fs-1"><i class="fa-solid fa-hourglass-end text-warning" aria-hidden="true"></i></span>
    <h1 class="h4 fw-bold mt-3">Este convite expirou</h1>
    <p class="text-muted">
      O link de convite{% if invite.nome %} para <strong>{{ invite.nome }}</strong>{% endif %} não é mais válido.
      Fale com a equipe do PetOrlândia para receber um novo convite.
    </p>
    <a href="{{ url_for('index') }}" class="btn btn-outline-primary rounded-pill">Ir para a página inicial</a>
  </div>
</div>
{% endblock %}
